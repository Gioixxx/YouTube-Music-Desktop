# Build Windows installer and portable exe; upload as artifacts (no release, no signing).
# Download the setup from: Actions → latest "Build" run → Artifacts.

name: Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer and portable
        run: npm run dist

      - name: Upload setup and portable as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: YouTube-Music-Desktop-${{ github.sha }}
          path: |
            dist/*.exe
            dist/*.yml
          if-no-files-found: error

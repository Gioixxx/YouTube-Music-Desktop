<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' file:; style-src 'unsafe-inline';" />
  <title>Mini Player</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 340px;
      height: 130px;
      overflow: hidden;
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: system-ui, sans-serif;
      font-size: 12px;
      user-select: none;
      -webkit-app-region: drag; /* allow dragging the window by the body */
    }

    /* Buttons must not be draggable */
    button, #progress-container {
      -webkit-app-region: no-drag;
    }

    #container {
      display: flex;
      flex-direction: row;
      align-items: center;
      height: 100%;
      padding: 8px;
      gap: 10px;
    }

    #artwork {
      width: 72px;
      height: 72px;
      border-radius: 6px;
      object-fit: cover;
      background: #2a2a4e;
      flex-shrink: 0;
    }

    #info-controls {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow: hidden;
    }

    #track-info {
      overflow: hidden;
    }

    #title {
      font-size: 13px;
      font-weight: 600;
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #artist {
      font-size: 11px;
      color: #aaaacc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #controls {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 6px;
    }

    button {
      background: none;
      border: none;
      cursor: pointer;
      color: #e0e0e0;
      font-size: 16px;
      padding: 2px 4px;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.15s;
    }

    button:hover {
      color: #ff4444;
    }

    #progress-container {
      width: 100%;
      height: 4px;
      background: #3a3a5e;
      border-radius: 2px;
      overflow: hidden;
      cursor: pointer;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: #ff4444;
      border-radius: 2px;
      transition: width 0.5s linear;
    }
  </style>
</head>
<body>
  <div id="container">
    <img id="artwork" src="" alt="artwork" />

    <div id="info-controls">
      <div id="track-info">
        <div id="title">No track playing</div>
        <div id="artist">—</div>
      </div>

      <div id="controls">
        <button id="btn-prev"  title="Previous">&#9664;&#9664;</button>
        <button id="btn-play"  title="Play / Pause">&#9654;</button>
        <button id="btn-next"  title="Next">&#9654;&#9654;</button>
      </div>

      <div id="progress-container">
        <div id="progress-bar"></div>
      </div>
    </div>
  </div>

  <script>
    const titleEl    = document.getElementById('title');
    const artistEl   = document.getElementById('artist');
    const artworkEl  = document.getElementById('artwork');
    const progressEl = document.getElementById('progress-bar');

    // -----------------------------------------------------------------------
    // Receive track updates from the main process
    // -----------------------------------------------------------------------
    window.ytmdAPI.on('miniPlayer:update', ({ title, artist, artworkPath }) => {
      titleEl.textContent  = title  || 'No track playing';
      artistEl.textContent = artist || '—';

      if (artworkPath) {
        artworkEl.src = 'file://' + artworkPath;
        artworkEl.style.display = '';
      } else {
        artworkEl.src = '';
        artworkEl.style.display = 'none';
      }

      // Reset progress bar on each new track
      progressEl.style.width = '0%';
    });

    // -----------------------------------------------------------------------
    // Playback controls
    // -----------------------------------------------------------------------
    document.getElementById('btn-prev').addEventListener('click', () => {
      window.ytmdAPI.send('media:previous');
    });

    document.getElementById('btn-play').addEventListener('click', () => {
      window.ytmdAPI.send('media:play');
    });

    document.getElementById('btn-next').addEventListener('click', () => {
      window.ytmdAPI.send('media:next');
    });
  </script>
</body>
</html>

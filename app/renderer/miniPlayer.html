<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' file:; style-src 'unsafe-inline';" />
  <title>Mini Player</title>
  <style>
    /* -----------------------------------------------------------------------
       CSS custom properties — one set per theme.
       The active theme class is applied to <html> by themeManager at runtime.
    ----------------------------------------------------------------------- */
    :root.dark {
      --bg:             #1a1a2e;
      --fg:             #e0e0e0;
      --fg-sub:         #aaaacc;
      --artwork-bg:     #2a2a4e;
      --progress-track: #3a3a5e;
      --accent:         #ff4444;
      --btn-hover:      #ff6666;
    }

    :root.light {
      --bg:             #f0f0f5;
      --fg:             #1a1a1a;
      --fg-sub:         #55557a;
      --artwork-bg:     #d8d8ee;
      --progress-track: #c0c0d8;
      --accent:         #cc2222;
      --btn-hover:      #ee3333;
    }

    /* -----------------------------------------------------------------------
       Layout
    ----------------------------------------------------------------------- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 340px;
      height: 130px;
      overflow: hidden;
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, sans-serif;
      font-size: 12px;
      user-select: none;
      -webkit-app-region: drag;
      transition: background 0.2s, color 0.2s;
    }

    button, #progress-container {
      -webkit-app-region: no-drag;
    }

    #container {
      display: flex;
      flex-direction: row;
      align-items: center;
      height: 100%;
      padding: 8px;
      gap: 10px;
    }

    #artwork {
      width: 72px;
      height: 72px;
      border-radius: 6px;
      object-fit: cover;
      background: var(--artwork-bg);
      flex-shrink: 0;
      transition: background 0.2s;
    }

    #info-controls {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow: hidden;
    }

    #track-info { overflow: hidden; }

    #title {
      font-size: 13px;
      font-weight: 600;
      color: var(--fg);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #artist {
      font-size: 11px;
      color: var(--fg-sub);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #controls {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 6px;
    }

    button {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--fg);
      font-size: 16px;
      padding: 2px 4px;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.15s;
    }

    button:hover { color: var(--btn-hover); }

    #progress-container {
      width: 100%;
      height: 4px;
      background: var(--progress-track);
      border-radius: 2px;
      overflow: hidden;
      cursor: pointer;
      transition: background 0.2s;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.5s linear, background 0.2s;
    }
  </style>
</head>
<body>
  <div id="container">
    <img id="artwork" src="" alt="artwork" />

    <div id="info-controls">
      <div id="track-info">
        <div id="title">No track playing</div>
        <div id="artist">—</div>
      </div>

      <div id="controls">
        <button id="btn-prev" title="Previous">&#9664;&#9664;</button>
        <button id="btn-play" title="Play / Pause">&#9654;</button>
        <button id="btn-next" title="Next">&#9654;&#9654;</button>
      </div>

      <div id="progress-container">
        <div id="progress-bar"></div>
      </div>
    </div>
  </div>

  <script>
    const titleEl    = document.getElementById('title');
    const artistEl   = document.getElementById('artist');
    const artworkEl  = document.getElementById('artwork');
    const progressEl = document.getElementById('progress-bar');

    // -----------------------------------------------------------------------
    // Theme support
    // Apply the theme class to <html> whenever the main process broadcasts a
    // theme change.  The initial class ("dark") matches the default config.
    // -----------------------------------------------------------------------
    window.ytmdAPI.on('theme:changed', ({ theme }) => {
      document.documentElement.className = theme; // 'light' | 'dark'
    });

    // -----------------------------------------------------------------------
    // Track updates from the main process
    // -----------------------------------------------------------------------
    window.ytmdAPI.on('miniPlayer:update', ({ title, artist, artworkPath }) => {
      titleEl.textContent  = title  || 'No track playing';
      artistEl.textContent = artist || '—';

      if (artworkPath) {
        artworkEl.src = 'file://' + artworkPath;
        artworkEl.style.display = '';
      } else {
        artworkEl.src = '';
        artworkEl.style.display = 'none';
      }

      progressEl.style.width = '0%';
    });

    // -----------------------------------------------------------------------
    // Playback controls
    // -----------------------------------------------------------------------
    document.getElementById('btn-prev').addEventListener('click', () => {
      window.ytmdAPI.send('media:previous');
    });

    document.getElementById('btn-play').addEventListener('click', () => {
      window.ytmdAPI.send('media:play');
    });

    document.getElementById('btn-next').addEventListener('click', () => {
      window.ytmdAPI.send('media:next');
    });
  </script>
</body>
</html>
